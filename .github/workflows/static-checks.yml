name: Static checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run docs test tier
        shell: pwsh
        run: .\scripts\test.ps1 -Tier docs

